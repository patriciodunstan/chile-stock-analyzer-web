log_format detailed '$time_iso8601 [$status] $request_method $request_uri '
                    '${request_time}s $body_bytes_sent bytes '
                    'from $remote_addr "$http_referer" "$http_user_agent"';

access_log /dev/stdout detailed;
error_log  /dev/stderr warn;

server {
    listen __PORT__;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
